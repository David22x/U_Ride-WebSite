<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>U-Ride — Iniciar sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/auth.css"/>
</head>
<body>

  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>

  <main class="auth-shell">

    <!-- Branding -->
    <aside class="brand-panel">
      <div class="brand-inner">
        <div class="logo-mark">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
            <rect width="48" height="48" rx="14" fill="var(--accent)"/>
            <path d="M10 32 Q24 14 38 32" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            <circle cx="24" cy="19" r="4" fill="white"/>
          </svg>
          <span class="logo-text">U-Ride</span>
        </div>
        <h1 class="brand-headline">Bienvenido<br/><em>de vuelta</em></h1>
        <p class="brand-sub">Tu comunidad de transporte universitario te está esperando.</p>
      </div>
    </aside>

    <!-- Formulario -->
    <section class="form-panel login-panel">
      <div class="form-card" id="step-login">

        <h2 class="form-title">Inicia sesión</h2>
        <p class="form-subtitle">Ingresa tus credenciales institucionales</p>

        <form id="form-login" novalidate>

          <div class="field-group">
            <label for="correo">Correo institucional</label>
            <div class="input-with-icon">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="4" width="20" height="16" rx="3"/>
                <path d="M2 8l10 6 10-6"/>
              </svg>
              <input type="email" id="correo" name="correo" placeholder="nombre@uta.edu.ec" autocomplete="email"/>
            </div>
            <span class="field-error" id="err-correo"></span>
          </div>

          <div class="field-group">
            <label for="contrasena">
              Contraseña
              <a href="/recuperar.html" class="label-link">¿Olvidaste tu contraseña?</a>
            </label>
            <div class="input-with-icon">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="11" width="18" height="11" rx="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
              <input type="password" id="contrasena" name="contrasena" placeholder="Tu contraseña" autocomplete="current-password"/>
              <button type="button" class="toggle-pass" data-target="contrasena" aria-label="Mostrar contraseña">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="err-contrasena"></span>
          </div>

          <div class="alert" id="alert-login" role="alert" aria-live="polite"></div>

          <button type="submit" class="btn-primary" id="btn-login">
            <span class="btn-text">Ingresar</span>
            <span class="btn-spinner" hidden>
              <svg width="18" height="18" viewBox="0 0 24 24" class="spin"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="31" stroke-dashoffset="10"/></svg>
            </span>
          </button>

          <p class="form-footer">¿No tienes cuenta? <a href="/registro.html">Crear cuenta</a></p>
        </form>
      </div>
    </section>

  </main>

  <script src="/js/login.js"></script>
</body>
</html>
