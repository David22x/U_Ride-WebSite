<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>U-Ride — Crear cuenta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/auth.css"/>
</head>
<body>

  <header class="barra-registro">
    <a href="/index.html" class="logo">U-RIDE</a>
    <div class="titulo-registro">CREAR CUENTA</div>
  </header>

  <main class="contenedor-formulario">

    <section class="tarjeta-formulario form-card" id="step-registro">

      <form id="form-registro" novalidate>

        <label for="nombre">Nombres</label>
        <input type="text" id="nombre" name="nombre" autocomplete="given-name">
        <span class="field-error" id="err-nombre"></span>

        <label for="apellido">Apellidos</label>
        <input type="text" id="apellido" name="apellido" autocomplete="family-name">
        <span class="field-error" id="err-apellido"></span>

        <label for="correo">Correo institucional</label>
        <input type="email" id="correo" name="correo" autocomplete="email">
        <span class="field-error" id="err-correo"></span>

        <label for="carrera">Carrera</label>
        <select id="carrera" name="carrera">
          <option value="">Selecciona tu carrera</option>
          <option>Ingeniería en Software</option>
          <option>Ingeniería en Sistemas</option>
          <option>Ingeniería Industrial</option>
          <option>Ingeniería Electrónica</option>
          <option>Medicina</option>
          <option>Derecho</option>
          <option>Administración de Empresas</option>
          <option>Otra</option>
        </select>
        <span class="field-error" id="err-carrera"></span>

        <label for="zona">Zona / Barrio</label>
        <input type="text" id="zona" name="zona">

        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena">
        <span class="field-error" id="err-contrasena"></span>

        <label for="confirmar">Confirmar contraseña</label>
        <input type="password" id="confirmar" name="confirmar">
        <span class="field-error" id="err-confirmar"></span>

        <div class="alert" id="alert-registro" role="alert" aria-live="polite"></div>

        <button type="submit" class="btn-primary" id="btn-registro">
          <span class="btn-text">Crear</span>
          <span class="btn-spinner" hidden></span>
        </button>

        <p class="form-footer">¿Ya tienes cuenta? <a href="/login.html">Inicia sesión</a></p>

      </form>

    </section>

    <section class="tarjeta-formulario form-card hidden" id="step-verificacion">
      <h2 class="form-title">Código de verificación</h2>
      <p class="form-subtitle">Ingresa el código enviado a <strong id="correo-display"></strong></p>

      <div class="otp-grid" id="otp-grid">
        <input class="otp-input" type="text" maxlength="1">
        <input class="otp-input" type="text" maxlength="1">
        <input class="otp-input" type="text" maxlength="1">
        <input class="otp-input" type="text" maxlength="1">
        <input class="otp-input" type="text" maxlength="1">
        <input class="otp-input" type="text" maxlength="1">
      </div>

      <div class="alert" id="alert-verificacion" role="alert" aria-live="polite"></div>

      <button type="button" class="btn-primary" id="btn-verificar">
        <span class="btn-text">Verificar</span>
        <span class="btn-spinner" hidden></span>
      </button>

      <div class="resend-row">
        <span id="timer-text">Reenviar código en <strong id="countdown">15:00</strong></span>
        <button type="button" class="btn-link hidden" id="btn-reenviar">Reenviar código</button>
      </div>

      <button type="button" class="btn-ghost" id="btn-cambiar-correo">← Cambiar correo</button>
    </section>

    <section class="tarjeta-formulario form-card hidden" id="step-exito">
      <h2 class="form-title">¡Cuenta creada!</h2>
      <p class="form-subtitle">Tu cuenta ha sido verificada correctamente.</p>
      <a href="/login.html" class="btn-primary">Ir a iniciar sesión</a>
    </section>

  </main>

  <script src="js/registro.js"></script>
</body>
</html>
